fail_fast: true
default_stages: [pre-commit]

# Global exclude: dbt 빌드 산출물 및 외부 파일 제외
exclude: |
  (?x)^(
    target/|
    dbt_packages/|
    logs/|
    .*/target/|
    .*/dbt_packages/|
    superset-query/|
    tests/
  )

repos:
  # ============================================================
  # 1. 보안 검사 (TruffleHog) - 커밋 전 시크릿 스캐닝
  # ============================================================
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.88.5
    hooks:
      - id: trufflehog
        name: TruffleHog (Secrets Check)
        entry: bash -c 'trufflehog git file://. --since-commit HEAD --only-verified --fail'
        language: system

  # ============================================================
  # 2. 기본 검사
  # ============================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files

  # ============================================================
  # 3. Python 검사 (ruff)
  # ============================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ============================================================
  # 4. SQL 검사 (sqlfluff)
  # ============================================================
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.3.1
    hooks:
      - id: sqlfluff-fix
        additional_dependencies:
          ["dbt-athena-community", "sqlfluff-templater-dbt"]
      - id: sqlfluff-lint
        additional_dependencies:
          ["dbt-athena-community", "sqlfluff-templater-dbt"]

  # ============================================================
  # 5. dbt parse: manifest.json / catalog.json 갱신
  # ============================================================
  - repo: local
    hooks:
      - id: dbt-parse
        name: "Dbt: manifest.json 갱신"
        entry: bash -c 'dbt parse --profiles-dir .'
        language: system
        files: \.sql$
        pass_filenames: false
      - id: dbt-docs-generate
        name: "Dbt: catalog.json 갱신"
        entry: bash -c 'dbt docs generate --profiles-dir .'
        language: system
        files: \.sql$
        pass_filenames: false

  # ============================================================
  # 6. dbt-checkpoint: 정적 분석 + 메타데이터 검증
  # ============================================================
  - repo: https://github.com/dbt-checkpoint/dbt-checkpoint
    rev: v2.0.4
    hooks:
      # 정적 분석
      - id: check-script-semicolon
        name: "Check: SQL 파일 끝에 세미콜론 제거"
      - id: check-script-has-no-table-name
        name: "Check: 하드코딩된 테이블 이름 사용 금지 (ref/source 권장)"
        args: ["--ignore-dotless-table"]
      - id: check-model-name-contract
        name: "Check: 모델 명명 규칙 (stg/int/fct/dim/agg/base/meta)"
        args: ["--pattern", "(stg_|int_|fct_|dim_|agg_|base_|meta_).*"]
      # 문서화 검증
      - id: check-model-has-properties-file
        name: "Check: 모델 정의용 YAML 파일 존재 여부"
        files: models/.*\.sql$
      - id: check-model-has-description
        name: "Check: 모델 설명 작성 여부"
        files: models/.*\.sql$
      - id: check-model-columns-have-desc
        name: "Check: 모든 컬럼에 설명 포함 여부"
        files: models/.*\.sql$
      - id: check-model-has-all-columns
        name: "Check: YAML과 SQL 내 컬럼 일치 여부"
        files: models/.*\.sql$
      # Column Name Contracts
      - id: check-column-name-contract
        alias: check-column-bool-prefix
        name: "Contract: Boolean (is_/has_/do_ prefix)"
        args:
          [
            "--pattern",
            "^(is|has|do)_[a-z0-9]",
            "--dtypes",
            "BOOL",
            "BOOLEAN",
          ]
      - id: check-column-name-contract
        alias: check-column-timestamp-suffix
        name: "Contract: Timestamp (_at/_timestamp/_time suffix)"
        args:
          [
            "--pattern",
            ".*(_at|_timestamp|_time)$",
            "--dtypes",
            "TIMESTAMP",
            "TIMESTAMP_NTZ",
            "DATETIME",
          ]
      - id: check-column-name-contract
        alias: check-column-date-suffix
        name: "Contract: Date (_date/_dt suffix)"
        args: ["--pattern", ".*(_date|_dt)$", "--dtypes", "DATE"]
      - id: check-column-name-contract
        alias: check-column-amount-suffix
        name: "Contract: Amount (_amt/_amount/_price/_revenue suffix)"
        args:
          [
            "--pattern",
            ".*(_amt|_amount|_price|_revenue)$",
            "--dtypes",
            "NUMERIC",
            "DECIMAL",
            "FLOAT64",
          ]
      - id: check-column-name-contract
        alias: check-column-count-prefix
        name: "Contract: Count (n_/cnt_/total_ prefix)"
        args:
          [
            "--pattern",
            "^(n_|cnt_|total_).*",
            "--dtypes",
            "INT",
            "INTEGER",
            "INT64",
          ]
      # 소스 및 매크로 검증
      - id: check-source-table-has-description
        name: "Check: 소스 테이블 설명 작성 여부"
      - id: check-source-columns-have-desc
        name: "Check: 소스 컬럼 설명 작성 여부"
      - id: check-macro-has-description
        name: "Check: 매크로 설명 작성 여부"

  # ============================================================
  # 7. 커밋 메시지 훅 (prepare-commit-msg, commit-msg)
  # ============================================================
  - repo: local
    hooks:
      - id: smart-commit-msg
        name: Generate AI Commit Message
        entry: bash scripts/smart-commit-hook.sh
        language: system
        stages: [prepare-commit-msg]
      - id: validate-commit-msg
        name: Validate Commit Message
        entry: python3 scripts/validate_commit.py
        language: system
        stages: [commit-msg]
